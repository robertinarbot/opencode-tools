name: Build and Push Docker Images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Opencode version to build'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Opencode version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push base image
        uses: docker/build-push-action@v5
        with:
          context: ./docker
          file: ./docker/base.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/base:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/base:latest
          labels: |
            org.opencontainers.image.title=opencode-base
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push Go image
        uses: docker/build-push-action@v5
        with:
          context: ./docker
          file: ./docker/go.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/go:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/go:latest
          labels: |
            org.opencontainers.image.title=opencode-go
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push Java image
        uses: docker/build-push-action@v5
        with:
          context: ./docker
          file: ./docker/java.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/java:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/java:latest
          labels: |
            org.opencontainers.image.title=opencode-java
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push JavaScript image
        uses: docker/build-push-action@v5
        with:
          context: ./docker
          file: ./docker/javascript.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/javascript:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/javascript:latest
          labels: |
            org.opencontainers.image.title=opencode-javascript
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push Rust image
        uses: docker/build-push-action@v5
        with:
          context: ./docker
          file: ./docker/rust.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/rust:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/rust:latest
          labels: |
            org.opencontainers.image.title=opencode-rust
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push All-in-One image
        uses: docker/build-push-action@v5
        with:
          context: ./docker
          file: ./docker/all.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/all:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/all:latest
          labels: |
            org.opencontainers.image.title=opencode-all
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Update README with version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s|v1\.0\.0|$VERSION|g" README.md
          sed -i "s|opencode-tools/base:v[0-9.]*|opencode-tools/base:$VERSION|g" README.md
          sed -i "s|opencode-tools/go:v[0-9.]*|opencode-tools/go:$VERSION|g" README.md
          sed -i "s|opencode-tools/java:v[0-9.]*|opencode-tools/java:$VERSION|g" README.md
          sed -i "s|opencode-tools/javascript:v[0-9.]*|opencode-tools/javascript:$VERSION|g" README.md
          sed -i "s|opencode-tools/rust:v[0-9.]*|opencode-tools/rust:$VERSION|g" README.md
          sed -i "s|opencode-tools/all:v[0-9.]*|opencode-tools/all:$VERSION|g" README.md

      - name: Commit and push README
        uses: EndBug/add-and-commit@v9
        with:
          message: 'Update README with version ${{ steps.version.outputs.version }}'
          add: 'README.md'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
